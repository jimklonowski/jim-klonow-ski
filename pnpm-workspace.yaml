allowBuilds:
  '@parcel/watcher': true
  better-sqlite3: true
  esbuild: true
  maplibre-gl: true
  sharp: true
  unrs-resolver: true
  vue-demi: true
  workerd: true

# Force a single Vue version across the tree. Without this, transitive deps resolved
# multiple Vue patch releases (3.5.38/39/40) side by side, which made Nuxt UI's ULink /
# vue-router `custom` slot receive undefined props during production SSR — crashing every
# page with a header/link on hard reload ("Cannot destructure property 'href' of undefined").
overrides:
  vue: 3.5.40
  '@vue/shared': 3.5.40
  '@vue/reactivity': 3.5.40
  '@vue/runtime-core': 3.5.40
  '@vue/runtime-dom': 3.5.40
  '@vue/server-renderer': 3.5.40
  '@vue/compiler-core': 3.5.40
  '@vue/compiler-dom': 3.5.40
  '@vue/compiler-sfc': 3.5.40
  '@vue/compiler-ssr': 3.5.40
